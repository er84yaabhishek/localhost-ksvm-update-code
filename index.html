<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Progress Bar</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 600px;
            margin: 50px auto;
            position: relative;
        }

        .progress-container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #ddd;
            z-index: -1;
            transform: translateY(-50%);
        }

        .step {
            text-align: center;
            position: relative;
            width: 16.6%;
        }

        .step .circle {
            width: 20px;
            height: 20px;
            background: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 5px;
            transition: background 0.3s ease;
        }

        .step.active .circle {
            background: #f4b400;
        }

        .step p {
            font-size: 12px;
            color: #999;
        }

        .step.active p {
            color: #000;
            font-weight: bold;
        }

        @media (max-width: 500px) {
            .progress-container {
                flex-wrap: wrap;
                max-width: 90%;
            }

            .step {
                width: 30%;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <div class="step active">
            <div class="circle"></div>
            <p>Pending</p>
        </div>
        <div class="step">
            <div class="circle"></div>
            <p>Received</p>
        </div>
        <div class="step">
            <div class="circle"></div>
            <p>Preparing</p>
        </div>
        <div class="step">
            <div class="circle"></div>
            <p>Cancelled</p>
        </div>
        <div class="step">
            <div class="circle"></div>
            <p>Ready to Serve</p>
        </div>
        <div class="step">
            <div class="circle"></div>
            <p>Served</p>
        </div>
    </div>

</body>
</html>
